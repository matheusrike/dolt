name: dolt-backend
services:
    mongodb:
        image: mongo:8.0
        container_name: MongoDB
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: admin
        volumes:
            - mongodb_data:/data/db

volumes:
    mongodb_data:
        driver: local
